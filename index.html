<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shell, Pen, Dice — Clothes (tragen)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  @keyframes bounce-soft { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-4px);} }
  .animate-bounce-soft { animation: bounce-soft 0.8s ease-in-out 2; }
  @keyframes fade-in-up { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
  .animate-fade-in-up { animation: fade-in-up 0.4s ease-out; }
</style>
</head>
<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ---------- Inline icon components (replacing lucide-react) ---------- */
const Icon = ({ children, className = "w-5 h-5" }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
       className={className}>{children}</svg>
);
const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
const ArrowLeftRight = (p) => <Icon {...p}><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="m16 21 4-4-4-4"/><path d="M20 17H4"/></Icon>;
const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
const Timer = (p) => <Icon {...p}><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></Icon>;
const History = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></Icon>;

/* ---------- Sentence data ---------- */
/* ---------- Sentence data ----------
   gender: "m" (der → blue), "f" (die → red), "n" (das → green), "pl" (yellow)
   targetNoun: the English word(s) to highlight in the prompt
*/
const RAW_SENTENCES = [
  { en: "I am wearing a black jacket.", de: "Ich trage eine schwarze Jacke.", targetNoun: "jacket", gender: "f" },
  { en: "Today I am wearing a white T-shirt.", de: "Heute trage ich ein weißes T-Shirt.", targetNoun: "T-shirt", gender: "n" },
  { en: "You (informal) are wearing blue jeans.", de: "Du trägst blaue Jeans.", targetNoun: "jeans", gender: "pl" },
  { en: "Now you are wearing a striped tie.", de: "Jetzt trägst du eine gestreifte Krawatte.", targetNoun: "tie", gender: "f" },
  { en: "He is wearing a red pullover.", de: "Er trägt einen roten Pullover.", targetNoun: "pullover", gender: "m" },
  { en: "At home he wears comfortable trousers.", de: "Zu Hause trägt er eine bequeme Hose.", targetNoun: "trousers", gender: "f" },
  { en: "She is wearing a long dress.", de: "Sie trägt ein langes Kleid.", targetNoun: "dress", gender: "n" },
  { en: "In the school we wear a uniform.", de: "In der Schule tragen wir eine Uniform.", targetNoun: "uniform", gender: "f" },
  { en: "You (plural) are wearing new shoes.", de: "Ihr tragt neue Schuhe.", targetNoun: "shoes", gender: "pl" },
  { en: "Today you are wearing short trousers.", de: "Heute tragt ihr eine kurze Hose.", targetNoun: "short trousers", gender: "f" },
  { en: "They are wearing grey socks.", de: "Sie tragen graue Socken.", targetNoun: "socks", gender: "pl" },
  { en: "He is wearing a fashionable suit.", de: "Er trägt einen modischen Anzug.", targetNoun: "suit", gender: "m" },
  { en: "She is wearing a green scarf.", de: "Sie trägt einen grünen Schal.", targetNoun: "scarf", gender: "m" },
  { en: "I am wearing an old hat.", de: "Ich trage eine alte Mütze.", targetNoun: "hat", gender: "f" },
  { en: "Today I am wearing a yellow blouse.", de: "Heute trage ich eine gelbe Bluse.", targetNoun: "blouse", gender: "f" },
  { en: "At home I wear a checked shirt.", de: "Zu Hause trage ich ein kariertes Hemd.", targetNoun: "shirt", gender: "n" },
  { en: "My sister wears a pink skirt.", de: "Meine Schwester trägt einen rosa Rock.", targetNoun: "skirt", gender: "m" },
  { en: "You (plural) wear winter boots.", de: "Ihr tragt Winterstiefel.", targetNoun: "winter boots", gender: "pl" },
  { en: "Now she is wearing a warm coat.", de: "Jetzt trägt sie einen warmen Mantel.", targetNoun: "coat", gender: "m" },
  { en: "In school we wear comfortable clothes.", de: "In der Schule tragen wir bequeme Kleidung.", targetNoun: "clothes", gender: "f" },
  { en: "Normally I wear jeans.", de: "Normalerweise trage ich Jeans.", targetNoun: "jeans", gender: "pl" },
  { en: "In winter I wear a warm coat.", de: "Im Winter trage ich einen warmen Mantel.", targetNoun: "coat", gender: "m" },
  { en: "In summer I wear a swimsuit.", de: "Im Sommer trage ich einen Badeanzug.", targetNoun: "swimsuit", gender: "m" },
  { en: "In my free time I wear comfortable clothes.", de: "In der Freizeit trage ich bequeme Kleidung.", targetNoun: "clothes", gender: "f" },
  { en: "To the party I wear a beautiful dress.", de: "Zur Party trage ich ein schönes Kleid.", targetNoun: "dress", gender: "n" },
  { en: "In winter he wears a scarf.", de: "Im Winter trägt er einen Schal.", targetNoun: "scarf", gender: "m" },
  { en: "In summer I wear shorts.", de: "Im Sommer trage ich eine kurze Hose.", targetNoun: "shorts", gender: "f" },
  { en: "Normally she wears a blouse.", de: "Normalerweise trägt sie eine Bluse.", targetNoun: "blouse", gender: "f" },
  { en: "In my free time he wears a hoodie.", de: "In der Freizeit trägt er einen Kapuzenpulli.", targetNoun: "hoodie", gender: "m" },
  { en: "To the party he wears a suit.", de: "Zur Party trägt er einen Anzug.", targetNoun: "suit", gender: "m" },
  { en: "In winter we wear boots.", de: "Im Winter tragen wir Stiefel.", targetNoun: "boots", gender: "pl" },
  { en: "Normally they wear black clothes.", de: "Normalerweise tragen sie schwarze Kleidung.", targetNoun: "clothes", gender: "f" }
];

const ADJECTIVE_STEMS = [
  "schwarz", "weiß", "weiss", "blau", "gestreift", "rot", "bequem", "lang", "neu",
  "kurz", "grau", "modisch", "grün", "gruen", "alt", "gelb", "kariert", "rosa",
  "warm", "schön", "schoen"
];

const FLEXIBLE_CONTEXTS = {
  school:  ["in", "der", "die", "schule"],
  party:   ["zur", "zu", "der", "die", "party", "für", "fuer"],
  time:    ["im", "in", "dem", "der"],
  leisure: ["freizeit", "meiner", "meine"]
};

const SPECIAL_CHARS = ['ä', 'ö', 'ü', 'ß'];

/* ---------- Inversion bonus logic ---------- */
// All conjugated forms of "tragen" that appear in the sentence pool
const VERB_FORMS = ["trage", "trägst", "tragst", "trägt", "tragt", "tragen"];

// Single-word subject pronouns that come immediately after the verb
const SUBJECT_PRONOUNS = ["ich", "du", "er", "sie", "es", "wir", "ihr"];

const startsWithSubject = (sentence) => {
  const firstWord = sentence.toLowerCase().replace(/[.,!?-]/g, "").trim().split(/\s+/)[0];
  // "Meine Schwester trägt..." starts with a subject (the noun phrase)
  if (firstWord === "meine") return true;
  return SUBJECT_PRONOUNS.includes(firstWord);
};

// Award a bonus point when the target sentence requires V-S inversion
// (it starts with a time/place phrase) AND the student's answer correctly
// places the verb directly before the subject.
const checkInversionBonus = (userInput, targetSentence) => {
  // Only relevant when the target requires inversion
  if (startsWithSubject(targetSentence)) return false;

  const words = userInput.toLowerCase().replace(/[.,!?-]/g, "").trim().split(/\s+/).filter(Boolean);
  if (words.length < 3) return false; // need at least: [phrase] [verb] [subject]

  // Find the first verb form in the student's answer
  const verbIndex = words.findIndex(w => VERB_FORMS.includes(w));
  if (verbIndex < 1) return false; // verb must come AFTER something (the fronted phrase),
                                   // i.e. not at position 0 — that would be a question/command

  // The word right after the verb must be a subject
  const afterVerb = words[verbIndex + 1];
  if (!afterVerb) return false;
  if (afterVerb === "meine") return true; // "...trägt meine Schwester..."
  return SUBJECT_PRONOUNS.includes(afterVerb);
};

/* ---------- Gender colour scheme for the English prompt ---------- */
const GENDER_STYLES = {
  m:  { className: "text-blue-600 font-black underline decoration-2 underline-offset-4", label: "der" },
  f:  { className: "text-red-600 font-black underline decoration-2 underline-offset-4", label: "die" },
  n:  { className: "text-green-600 font-black underline decoration-2 underline-offset-4", label: "das" },
  pl: { className: "text-yellow-600 font-black underline decoration-2 underline-offset-4", label: "die (pl.)" }
};

// Render an English sentence with the target noun highlighted in the
// colour of its German gender. Case-insensitive, matches the FIRST occurrence.
const HighlightedSentence = ({ en, targetNoun, gender }) => {
  const style = GENDER_STYLES[gender];
  if (!style || !targetNoun) return <span>{en}</span>;

  const lower = en.toLowerCase();
  const idx = lower.indexOf(targetNoun.toLowerCase());
  if (idx === -1) return <span>{en}</span>;

  const before = en.slice(0, idx);
  const match = en.slice(idx, idx + targetNoun.length);
  const after = en.slice(idx + targetNoun.length);

  return (
    <span>
      {before}
      <span className={style.className} title={`German gender: ${style.label}`}>{match}</span>
      {after}
    </span>
  );
};

/* ---------- Main App ---------- */
function App() {
  // Each student gets their own independently shuffled list,
  // so A and B start on different sentences and don't see the same order.
  const studentSentences = useMemo(() => ({
    A: [...RAW_SENTENCES].sort(() => Math.random() - 0.5),
    B: [...RAW_SENTENCES].sort(() => Math.random() - 0.5)
  }), []);

  const [activePlayer, setActivePlayer] = useState('A');
  const [timeLeft, setTimeLeft] = useState(300);
  const [isGameOver, setIsGameOver] = useState(false);
  const [gameState, setGameState] = useState({
    A: { index: 0, score: 0, currentInput: "", completed: false, history: [] },
    B: { index: 0, score: 0, currentInput: "", completed: false, history: [] }
  });
  const [feedback, setFeedback] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (timeLeft <= 0 || isGameOver) {
      if (timeLeft <= 0) setIsGameOver(true);
      return;
    }
    const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
    return () => clearInterval(timer);
  }, [timeLeft, isGameOver]);

  useEffect(() => {
    if (inputRef.current) inputRef.current.focus();
  }, [activePlayer]);

  const formatTime = (seconds) => {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  };

  const normalize = (str) => str.toLowerCase().replace(/[.,!?-]/g, "").trim();

  const analyzeTranslation = (userInput, targetSentence) => {
    const userWords = normalize(userInput).split(/\s+/).filter(w => w.length > 0);
    const targetWords = targetSentence.split(/\s+/).filter(w => w.length > 0);

    return targetWords.map((targetWord, i) => {
      const cleanTarget = normalize(targetWord);
      const userWord = userWords[i];
      let isCorrect = false;

      if (userWord) {
        const stemMatch = ADJECTIVE_STEMS.find(stem => cleanTarget.startsWith(stem));
        if (stemMatch && userWord.startsWith(stemMatch)) {
          isCorrect = true;
        } else {
          let foundInGroup = false;
          for (const group of Object.values(FLEXIBLE_CONTEXTS)) {
            if (group.includes(cleanTarget) && group.includes(userWord)) {
              foundInGroup = true;
              break;
            }
          }
          if (foundInGroup) isCorrect = true;
          else if (userWord === cleanTarget) isCorrect = true;
        }
      }

      return { word: targetWord, isCorrect };
    });
  };

  const handleSwap = () => {
    setActivePlayer(prev => prev === 'A' ? 'B' : 'A');
    setFeedback(null);
  };

  const insertChar = (char) => {
    setGameState(prev => ({
      ...prev,
      [activePlayer]: {
        ...prev[activePlayer],
        currentInput: prev[activePlayer].currentInput + char
      }
    }));
    if (inputRef.current) inputRef.current.focus();
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const player = gameState[activePlayer];
    if (player.completed) return;

    const sentences = studentSentences[activePlayer];
    const targetSentence = sentences[player.index].de;
    const wordAnalysis = analyzeTranslation(player.currentInput, targetSentence);
    const pointsEarned = wordAnalysis.filter(w => w.isCorrect).length;
    const inversionBonus = checkInversionBonus(player.currentInput, targetSentence) ? 1 : 0;

    const nextIndex = player.index + 1;
    const isFinished = nextIndex >= sentences.length;

    const historyItem = {
      en: sentences[player.index].en,
      de: targetSentence,
      targetNoun: sentences[player.index].targetNoun,
      gender: sentences[player.index].gender,
      analysis: wordAnalysis,
      inversionBonus
    };

    setGameState(prev => ({
      ...prev,
      [activePlayer]: {
        ...prev[activePlayer],
        score: prev[activePlayer].score + pointsEarned + inversionBonus,
        index: nextIndex,
        currentInput: "",
        completed: isFinished,
        history: [historyItem, ...prev[activePlayer].history]
      }
    }));

    setFeedback({ points: pointsEarned, inversionBonus });
    setTimeout(() => setFeedback(null), 3000);
  };

  const currentPlayer = gameState[activePlayer];

  /* ---------- Game Over Screen ---------- */
  if (isGameOver || (gameState.A.completed && gameState.B.completed)) {
    return (
      <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
        <div className="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-t-8 border-indigo-600">
          <Trophy className="w-20 h-20 text-yellow-500 mx-auto mb-4" />
          <h1 className="text-3xl font-bold text-slate-800 mb-2">Match Result!</h1>
          <p className="text-xl text-slate-600 mb-6">Time is up or all sentences translated!</p>
          <div className="space-y-4 mb-8">
            <div className={`flex justify-between items-center p-4 rounded-xl ${gameState.A.score > gameState.B.score ? 'bg-indigo-50 ring-2 ring-indigo-500' : 'bg-slate-100'}`}>
              <span className="font-bold text-slate-700">Student A</span>
              <span className="text-2xl font-black text-indigo-600">{gameState.A.score}</span>
            </div>
            <div className={`flex justify-between items-center p-4 rounded-xl ${gameState.B.score > gameState.A.score ? 'bg-emerald-50 ring-2 ring-emerald-500' : 'bg-slate-100'}`}>
              <span className="font-bold text-slate-700">Student B</span>
              <span className="text-2xl font-black text-emerald-600">{gameState.B.score}</span>
            </div>
          </div>
          <button onClick={() => window.location.reload()}
                  className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
            Restart Match
          </button>
        </div>
      </div>
    );
  }

  /* ---------- Active Game ---------- */
  return (
    <div className="min-h-screen bg-slate-100 p-4 md:p-8">
      {/* Top bar: timer + swap */}
      <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-4 mb-8 items-center justify-between">
        <div className="flex items-center gap-3 bg-white px-6 py-3 rounded-2xl shadow-md border-b-4 border-slate-200">
          <Timer className={`w-6 h-6 ${timeLeft < 30 ? 'text-red-500 animate-pulse' : 'text-indigo-600'}`} />
          <span className={`text-2xl font-black ${timeLeft < 30 ? 'text-red-600' : 'text-slate-700'}`}>
            {formatTime(timeLeft)}
          </span>
        </div>

        <button onClick={handleSwap}
                className="flex-grow max-w-md bg-orange-500 hover:bg-orange-600 text-white font-black py-4 px-8 rounded-2xl shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95 group">
          <ArrowLeftRight className="w-8 h-8 group-hover:rotate-180 transition-transform duration-500" />
          <span className="text-xl md:text-2xl uppercase tracking-wider">Dice 6? Swap!</span>
        </button>
      </div>

      {/* Colour legend */}
      <div className="max-w-4xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 px-4 py-3 mb-4 flex flex-wrap items-center justify-center gap-x-5 gap-y-2 text-sm">
        <span className="text-xs font-bold uppercase tracking-wider text-slate-500">Noun colour =</span>
        <span className="text-blue-600 font-black underline decoration-2 underline-offset-4">masculine</span>
        <span className="text-red-600 font-black underline decoration-2 underline-offset-4">feminine</span>
        <span className="text-green-600 font-black underline decoration-2 underline-offset-4">neuter</span>
        <span className="text-yellow-600 font-black underline decoration-2 underline-offset-4">plural</span>
      </div>

      {/* Score cards */}
      <div className="max-w-4xl mx-auto grid grid-cols-2 gap-4 mb-8">
        <div className={`p-4 rounded-2xl transition-all duration-300 transform ${activePlayer === 'A' ? 'bg-white shadow-lg ring-4 ring-indigo-500 scale-105' : 'bg-white/60 opacity-60'}`}>
          <div className="flex justify-between items-center">
            <div>
              <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">Student A</p>
              <p className="text-2xl font-black text-indigo-600">{gameState.A.score}</p>
            </div>
            <div className="text-right">
              <p className="text-[10px] text-slate-400">PROGRESS</p>
              <p className="text-sm font-bold text-slate-600">{gameState.A.index}/{studentSentences.A.length}</p>
            </div>
          </div>
          <div className="w-full bg-slate-200 h-1.5 mt-2 rounded-full overflow-hidden">
            <div className="bg-indigo-500 h-full transition-all" style={{ width: `${(gameState.A.index / studentSentences.A.length) * 100}%` }}></div>
          </div>
        </div>

        <div className={`p-4 rounded-2xl transition-all duration-300 transform ${activePlayer === 'B' ? 'bg-white shadow-lg ring-4 ring-emerald-500 scale-105' : 'bg-white/60 opacity-60'}`}>
          <div className="flex justify-between items-center">
            <div>
              <p className="text-[10px] font-bold uppercase tracking-wider text-slate-500">Student B</p>
              <p className="text-2xl font-black text-emerald-600">{gameState.B.score}</p>
            </div>
            <div className="text-right">
              <p className="text-[10px] text-slate-400">PROGRESS</p>
              <p className="text-sm font-bold text-slate-600">{gameState.B.index}/{studentSentences.B.length}</p>
            </div>
          </div>
          <div className="w-full bg-slate-200 h-1.5 mt-2 rounded-full overflow-hidden">
            <div className="bg-emerald-500 h-full transition-all" style={{ width: `${(gameState.B.index / studentSentences.B.length) * 100}%` }}></div>
          </div>
        </div>
      </div>

      {/* Main play area */}
      <div className="max-w-2xl mx-auto space-y-8">
        {!currentPlayer.completed ? (
          <div className="bg-white p-8 rounded-3xl shadow-lg border-b-4 border-slate-200">
            <div className="flex items-center gap-2 text-indigo-600 mb-2">
              <Info className="w-4 h-4" />
              <span className="text-xs font-bold uppercase tracking-widest">Translate to German</span>
            </div>
            <h2 className="text-2xl md:text-3xl font-bold text-slate-800 mb-6 leading-tight">
              <HighlightedSentence
                en={studentSentences[activePlayer][currentPlayer.index].en}
                targetNoun={studentSentences[activePlayer][currentPlayer.index].targetNoun}
                gender={studentSentences[activePlayer][currentPlayer.index].gender}
              />
            </h2>

            <form onSubmit={handleSubmit} className="space-y-4">
              <input
                ref={inputRef}
                type="text"
                value={currentPlayer.currentInput}
                onChange={(e) => setGameState(prev => ({
                  ...prev,
                  [activePlayer]: { ...prev[activePlayer], currentInput: e.target.value }
                }))}
                placeholder="Type your translation..."
                className="w-full text-xl p-5 border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:outline-none transition-all shadow-inner"
                autoComplete="off"
              />
              <div className="flex flex-wrap gap-2">
                {SPECIAL_CHARS.map(char => (
                  <button key={char} type="button" onClick={() => insertChar(char)}
                          className="w-12 h-12 bg-slate-100 hover:bg-slate-200 rounded-xl font-bold text-slate-700 shadow-sm transition-all">
                    {char}
                  </button>
                ))}
                <div className="flex-grow"></div>
                <button type="submit"
                        className="bg-indigo-600 hover:bg-indigo-700 text-white px-10 py-3 rounded-2xl font-black shadow-lg transition-all active:scale-95">
                  SUBMIT
                </button>
              </div>
            </form>

            {feedback && (
              <div className="mt-4 space-y-2 animate-fade-in-up">
                <div className="p-3 bg-indigo-50 text-indigo-700 rounded-xl font-bold flex items-center gap-2">
                  <CheckCircle2 className="w-5 h-5" /> +{feedback.points} Points Awarded!
                </div>
                {feedback.inversionBonus > 0 && (
                  <div className="p-3 bg-amber-50 text-amber-800 rounded-xl font-bold flex items-center gap-2 border-2 border-amber-200">
                    <span className="text-xl">⚡</span>
                    +1 Bonus — Inversion correct! (verb before subject)
                  </div>
                )}
              </div>
            )}
          </div>
        ) : (
          <div className="bg-green-100 p-8 rounded-3xl text-center border-2 border-green-200 shadow-md">
            <CheckCircle2 className="w-12 h-12 text-green-500 mx-auto mb-2" />
            <h3 className="text-2xl font-black text-green-800 uppercase">You've Finished!</h3>
            <p className="text-green-700">Wait for your partner or help them reach the end!</p>
          </div>
        )}

        {currentPlayer.history.length > 0 && (
          <div className="space-y-4">
            <div className="flex items-center gap-2 px-2">
              <History className="w-5 h-5 text-slate-400" />
              <h3 className="text-sm font-black text-slate-400 uppercase tracking-widest">
                Translation History (Student {activePlayer})
              </h3>
            </div>
            <div className="space-y-3">
              {currentPlayer.history.map((item, idx) => (
                <div key={idx} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 animate-fade-in-up">
                  <div className="flex items-start justify-between gap-3 mb-1">
                    <p className="text-xs font-bold text-slate-400 uppercase">
                      <HighlightedSentence en={item.en} targetNoun={item.targetNoun} gender={item.gender} />
                    </p>
                    {item.inversionBonus > 0 && (
                      <span className="text-[10px] font-black text-amber-700 bg-amber-100 px-2 py-0.5 rounded-full whitespace-nowrap">
                        ⚡ +1 INVERSION
                      </span>
                    )}
                  </div>
                  <div className="flex flex-wrap gap-x-2 gap-y-1 text-lg font-medium">
                    {item.analysis.map((wordObj, wIdx) => (
                      <span key={wIdx}
                            className={wordObj.isCorrect
                              ? 'text-emerald-600 font-bold'
                              : 'text-red-500 underline decoration-dotted underline-offset-4 decoration-2 opacity-80'}>
                        {wordObj.word}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
